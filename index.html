<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abinash Bal | Academic Portfolio</title>
    <script>
      // Aggressively suppress environmental errors that interfere with the preview
      (function() {
        const suppressStrings = ['fetch', 'getter', 'property', 'Window'];
        const shouldSuppress = (msg) => suppressStrings.every(s => msg.includes(s)) || (msg.includes('fetch') && msg.includes('getter'));

        // Handle errors
        window.addEventListener('error', function(e) {
          const message = e.message || "";
          if (shouldSuppress(message)) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);

        // Handle unhandled rejections
        window.addEventListener('unhandledrejection', function(e) {
          const message = (e.reason && e.reason.message) || String(e.reason || "");
          if (shouldSuppress(message)) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }, true);

        // Try to shadow the fetch property descriptor if possible to prevent the error before it happens
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: () => originalFetch,
            set: (v) => { console.warn('Blocked attempt to override fetch'); }
          });
        } catch (err) {
          // ignore failures to redefine
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
